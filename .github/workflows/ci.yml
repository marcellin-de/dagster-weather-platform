name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Ensure Dagster home
        run: |
          mkdir -p .dg
          touch .dg/dagster.yaml

      - name: Validate Dagster definitions
        run: uv run bash -lc 'DAGSTER_HOME="$PWD/.dg" dg check defs'

      - name: Run tests
        run: uv run python -m unittest discover -s tests -p "test_*.py" -v
