# Data quality tests for staging models
version: 2

models:
  - name: stg_open_meteo_hourly
    description: "Staging model for Open Meteo hourly weather data."
    config:
      contract:
        enforced: true
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 36, period: hour}
    loaded_at_field: ts_utc
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: ts_utc
        description: "Timestamp in UTC timezone."
        data_type: timestamp
        tests:
          - not_null
          - unique
      - name: latitude
        description: "Latitude of the weather observation."
        data_type: double
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -90
              max_value: 90
      - name: longitude
        description: "Longitude of the weather observation."
        data_type: double
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -180
              max_value: 180
      - name: temperature_2m
        description: "Temperature at 2 meters above ground level."
        data_type: double
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -80
              max_value: 60
      - name: relative_humidity_2m
        description: "Relative humidity at 2 meters above ground level."
        data_type: double
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
      - name: precipitation
        description: "Precipitation amount."
        data_type: double
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1000
      - name: wind_speed_10m
        description: "Wind speed at 10 meters above ground level."
        data_type: double
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 200
