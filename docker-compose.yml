services:
  duckdb:
    build:
      context: .
      dockerfile: docker/Dockerfile.platform
    container_name: weather-duckdb
    command: >
      bash -lc "uv run python /opt/platform/docker/init_duckdb.py && tail -f /dev/null"
    environment:
      WEATHER_DUCKDB_PATH: /data/weather_ingest.duckdb
    volumes:
      - duckdb_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import duckdb; c=duckdb.connect('/data/weather_ingest.duckdb'); c.execute('select 1'); c.close()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.platform
    container_name: weather-mlflow
    depends_on:
      duckdb:
        condition: service_healthy
    command: >
      bash -lc "uv run mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  dagster:
    build:
      context: .
      dockerfile: docker/Dockerfile.platform
    container_name: weather-dagster
    depends_on:
      duckdb:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /opt/platform/.dg
      DAGSTER_PROJECT_ROOT: /opt/platform
      WEATHER_DUCKDB_PATH: /data/weather_ingest.duckdb
      WEATHER_DBT_DUCKDB_PATH: /data/weather_ingest.duckdb
      DESTINATION__DUCKDB__CREDENTIALS: /data/weather_ingest.duckdb
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: weather-forecasting
      UV_CACHE_DIR: /tmp/uv-cache
    command: ["bash", "-lc", "/opt/platform/docker/start-dagster.sh"]
    ports:
      - "3000:3000"
    volumes:
      - duckdb_data:/data
      - dagster_home:/opt/platform/.dg
    restart: unless-stopped

  evidence:
    build:
      context: .
      dockerfile: docker/Dockerfile.evidence
    container_name: weather-evidence
    depends_on:
      duckdb:
        condition: service_healthy
    environment:
      WEATHER_DUCKDB_PATH: /data/weather_ingest.duckdb
      EVIDENCE_PORT: 3001
    command: ["start-evidence.sh"]
    ports:
      - "3001:3001"
    volumes:
      - duckdb_data:/data
    restart: unless-stopped

volumes:
  duckdb_data:
  dagster_home:
  mlflow_data:
